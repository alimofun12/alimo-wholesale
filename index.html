  {id:'f19',seg:'lapsed',name:'The Aloha Bungalow',city:'Redondo Beach',state:'CA',email:'emily@thealohabungalow.com',contact:'Emily Poage',rev:1248,orders:4,last:'Dec 29, 2020',days:1894,source:'Faire',status:'not_contacted',b:[]},

const PH={HI:'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=700&q=60',CA:'https://images.unsplash.com/photo-1519046904884-53103b34b206?w=700&q=60',OR:'https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=700&q=60',NY:'https://images.unsplash.com/photo-1534430480872-3498386e7856?w=700&q=60',FL:'https://images.unsplash.com/photo-1515404929826-76fff9fef6fe?w=700&q=60',NJ:'https://images.unsplash.com/photo-1534430480872-3498386e7856?w=700&q=60',NC:'https://images.unsplash.com/photo-1471922694854-ff1b63b20054?w=700&q=60',MI:'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=700&q=60',IL:'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=700&q=60',ME:'https://images.unsplash.com/photo-1473621038790-b778b4750efe?w=700&q=60',CO:'https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?w=700&q=60',WY:'https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?w=700&q=60',BC:'https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=700&q=60',France:'https://images.unsplash.com/photo-1573843981267-be1999ff37cd?w=700&q=60',Japan:'https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=700&q=60',Spain:'https://images.unsplash.com/photo-1543783207-ec64e4d95325?w=700&q=60',Australia:'https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=700&q=60',Canada:'https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=700&q=60',def:'https://images.unsplash.com/photo-1439405326854-014607f694d7?w=700&q=60'};
const gp=c=>{if(c.country&&PH[c.country])return PH[c.country];return PH[c.state]||PH.def;};
const TABS=[{id:'cold',l:'New Leads',i:'✦'},{id:'warm',l:'Follow Up',i:'↩'},{id:'lapsed',l:'Win-Back',i:'💤'},{id:'active',l:'Active',i:'✓'}];
const N='#0D1B2A',KEY='alimo_v4';

function loadSaved(){try{const s=localStorage.getItem(KEY);return s?JSON.parse(s):null;}catch(e){return null;}}
function save(){try{localStorage.setItem(KEY,JSON.stringify({ov:shops.filter(s=>{const d=DATA.find(x=>x.id===s.id);return s.status!==d?.status||s.sentDate!==d?.sentDate;}).map(s=>({id:s.id,status:s.status,sentDate:s.sentDate})),learned,tab,selId,lastSync}));}catch(e){}}
const sv=loadSaved();
let shops=DATA.map(d=>{const o=sv?.ov?.find(x=>x.id===d.id);return o?{...d,status:o.status,sentDate:o.sentDate}:{...d};});
let learned=sv?.learned||[P1,P2],tab=sv?.tab||'cold',selId=sv?.selId||'c1',lastSync=sv?.lastSync||null;
let drafts=null,dIdx=0,body='',subj='',gen=false,send=false,err='',srchQ='';
const byTab=t=>shops.filter(s=>s.seg===t);
const getSel=()=>shops.find(s=>s.id===selId);
const cnts=()=>{const o={};TABS.forEach(t=>o[t.id]=byTab(t.id).length);return o;};
const filt=()=>{const q=srchQ.toLowerCase();return byTab(tab).filter(s=>[s.name,s.city,s.contact||'',s.state||'',s.country||''].some(x=>x.toLowerCase().includes(q)));};
let tT;
function toast(m,e=false){const el=document.getElementById('toast');el.textContent=m;el.style.background=e?'#B24A2C':N;el.style.display='block';clearTimeout(tT);tT=setTimeout(()=>el.style.display='none',3500);}
function onSearch(v){srchQ=v;renderList();}
function selShop(id){selId=id;drafts=null;body='';dIdx=0;err='';save();renderDetail();}
function selTab(t){tab=t;srchQ='';drafts=null;body='';err='';const f=byTab(t)[0];if(f)selId=f.id;save();document.getElementById('srch').value='';renderAll();}
function setDI(i){dIdx=i;const d=i===0?drafts.a:drafts.b;if(d){body=d;subj=i===0?drafts.sa:drafts.sb;}renderDetail();}
function markSent(id,b2){const now=new Date().toLocaleDateString('en-US',{month:'short',day:'2-digit',year:'numeric'});shops=shops.map(s=>s.id===id?{...s,status:'contacted',sentDate:now}:s);if(b2){learned=[...learned,b2].filter((v,i,a)=>a.indexOf(v)===i).slice(-10);}save();closeModal();renderAll();}
function closeModal(){document.getElementById('modal').style.display='none';document.getElementById('modal').innerHTML='';}
function openModal(id,name){const m=document.getElementById('modal');m.style.display='flex';m.innerHTML=`<div style="background:#FDFAF5;border-radius:12px;padding:22px;width:290px;font-family:sans-serif;box-shadow:0 20px 60px rgba(0,0,0,.3);"><p style="font-size:15px;font-weight:700;margin:0 0 8px">Mark as Sent</p><p style="font-size:12px;color:#555;margin:0 0 16px">Confirm you sent to <strong>${name}</strong>?</p><div style="display:flex;gap:8px;"><button onclick="markSent('${id}',null)" style="flex:1;background:${N};color:#F5F0E8;border:none;border-radius:7px;padding:9px;font-size:12px;font-weight:700;cursor:pointer;">Yes, mark sent</button><button onclick="closeModal()" style="flex:1;background:transparent;border:1px solid #ddd;border-radius:7px;padding:9px;font-size:12px;cursor:pointer;">Cancel</button></div></div>`;}

async function syncGmail(){
  const btn=document.getElementById('sync-btn');
  btn.disabled=true;btn.classList.add('syncing');btn.textContent='⟳ Syncing...';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-6',max_tokens:2000,
      mcp_servers:[{type:'url',url:'https://gmail.mcp.claude.com/mcp',name:'gmail'}],
      messages:[{role:'user',content:`Search my Gmail sent folder for ALL wholesale outreach emails from hello@alimofun.com. Use gmail_search_messages with query: "from:hello@alimofun.com is:sent" maxResults: 50. For each result return a JSON array: [{"to":"email@example.com","date":"Apr 13, 2026"}]. Return ONLY the JSON array, nothing else.`}]
    })});
    const data=await res.json();
    const raw=data.content?.find(b=>b.type==='text')?.text||'';
    const match=raw.match(/\[[\s\S]*\]/);
    if(!match)throw new Error('No data returned');
    const emails=JSON.parse(match[0]);
    const sentMap={};
    emails.forEach(e=>{if(e.to&&e.date){const a=e.to.toLowerCase().trim().replace(/.*<(.+)>/,'$1');if(!sentMap[a]||new Date(e.date)>new Date(sentMap[a]))sentMap[a]=e.date;}});
    let updated=0;
    shops=shops.map(s=>{
      if(!s.email)return s;
      const a=s.email.toLowerCase().trim();
      if(sentMap[a]){if(s.status!=='contacted'){updated++;}return{...s,status:'contacted',sentDate:sentMap[a]};}
      return s;
    });
    lastSync=new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    save();renderAll();
    toast(updated>0?`Synced! ${updated} shop${updated>1?'s':''} newly marked as contacted.`:`Up to date. ${Object.keys(sentMap).length} sent emails found.`);
  }catch(e){toast('Sync error: '+e.message,true);}
  finally{btn.disabled=false;btn.classList.remove('syncing');btn.textContent='⟳ Sync Gmail';}
}

async function generate(){
  const s=getSel();if(!s||gen)return;
  gen=true;err='';drafts=null;renderDetail();
  try{
    const ln=learned.length?'\n\nReal emails Alimo sent. Match this voice exactly:\n---\n'+learned.slice(-3).join('\n---\n'):'';
    const buls=s.b?.length?'About this shop:\n'+s.b.map(x=>'- '+x).join('\n'):'';
    const hist=s.rev?'Faire history: $'+s.rev.toLocaleString()+' total, '+s.orders+' orders, last: '+s.last+' ('+s.days+' days ago). Reference warmly.':'New prospect, never ordered from Alimo.';
    const sys=`You write wholesale emails for Alimo (Sean Kesterson), artist from Oregon based in Brooklyn. Makes bold colorful ocean/surf prints, puzzles, air fresheners, stickers. Stocked at Greenroom Gallery Hawaii. Commercial work: Patagonia, Swatch, Portland Trail Blazers.\n\nRULES: Short punchy sentences. Fragments OK. Casual warm genuine. NEVER use em dashes. No hyphens joining phrases. Short paragraphs. Humble ask. Reference something specific about this shop. Always include https://alimofun.faire.com, 50% off first order up to $150 1 year free shipping, Greenroom Gallery Hawaii.\n\nSIGN OFF exactly:\nCheers!\n\nThanks,\nAlimo\nalimofun.com\n@alimofun\n\nSUBJECT: Personal and specific to THIS shop, short, human, a bit fun. Two different ones.${ln}`;
    const usr=`Two different wholesale outreach emails from Alimo to this shop. Personal to THIS shop. SHORT, 4 paragraphs max.\n\nShop: ${s.name}\nLocation: ${s.city}${s.state?', '+s.state:''}${s.country?', '+s.country:''}\n${s.contact?'Contact: '+s.contact+'\n':''}${s.web?'Website: '+s.web+'\n':''}${buls}\n${hist}\n\nReturn EXACTLY:\nSUBJECT_A\n[subject]\nDRAFT_A\n[email]\nSUBJECT_B\n[subject]\nDRAFT_B\n[email]`;
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1400,system:sys,messages:[{role:'user',content:usr}]})});
    if(!r.ok)throw new Error('API '+r.status);
    const d=await r.json();if(d.error)throw new Error(d.error.message);
    const raw=d.content?.find(b=>b.type==='text')?.text||'';
    const saM=raw.match(/SUBJECT_A\n(.*?)\nDRAFT_A/s),aM=raw.match(/DRAFT_A\n([\s\S]*?)(?=SUBJECT_B)/),sbM=raw.match(/SUBJECT_B\n(.*?)\nDRAFT_B/s),bM=raw.match(/DRAFT_B\n([\s\S]*)$/);
    const sa=saM?saM[1].trim():'Hey from Alimo',bA=aM?aM[1].trim():raw.trim(),sb=sbM?sbM[1].trim():'surf art from an Oregon artist',bB=bM?bM[1].trim():'';
    if(!bA)throw new Error('Could not parse');
    drafts={a:bA,b:bB||bA,sa,sb};body=bA;subj=sa;
  }catch(e){err=e.message;}
  finally{gen=false;renderDetail();}
}

async function saveGmail(){
  const s=getSel();if(!s?.email||!body||send)return;
  send=true;renderDetail();
  try{
    await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:300,messages:[{role:'user',content:'Create a Gmail draft. To: '+s.email+'. Subject: '+subj+'. Body:\n'+body+'\n\nUse gmail_create_draft tool.'}],mcp_servers:[{type:'url',url:'https://gmail.mcp.claude.com/mcp',name:'gmail'}]})});
    markSent(s.id,body);toast('Saved to Gmail drafts!');
  }catch(e){toast('Gmail error: '+e.message,true);}
  finally{send=false;}
}

function chip(l,v,bg,tc){return`<div class="chip"${bg?` style="background:${bg};border-color:rgba(0,0,0,.1);"`:''}><div class="chl">${l}</div><div class="chv"${tc?` style="color:${tc}"`:''}>${v}</div></div>`;}

function renderAll(){renderHeader();renderTabs();renderList();renderDetail();}
function renderHeader(){
  const C=cnts();
  document.getElementById('tab-counts').innerHTML=TABS.map(t=>`<div class="tc${tab===t.id?' on':''}" onclick="selTab('${t.id}')"><div class="tcn">${C[t.id]}</div><div class="tcl">${t.l}</div></div>`).join('');
  document.getElementById('learn-badge').innerHTML=`<div class="lrn">📚 ${learned.length} learned${lastSync?' · '+lastSync:''}</div>`;
}
function renderTabs(){
  const C=cnts();
  document.getElementById('stabs').innerHTML=TABS.map(t=>`<button class="stab${tab===t.id?' on':''}" onclick="selTab('${t.id}')"><span class="stabn">${C[t.id]}</span><span>${t.i} ${t.l}</span></button>`).join('');
}
function renderList(){
  const F=filt();
  document.getElementById('slist').innerHTML=F.map(s=>{
    const on=s.id===selId,c=s.status==='contacted'||s.status==='active';
    return`<div class="si${on?' on':''}" onclick="selShop('${s.id}')">
      <div style="display:flex;align-items:center;gap:3px;margin-bottom:1px;">
        ${c?`<span style="font-size:7px;font-weight:700;color:${on?'#5BA89E':'#1A7B4E'};">✓</span>`:''}
        <span class="sin">${s.name}</span>
        ${s.rev?`<span style="font-size:7px;font-weight:700;color:${on?'#E07A50':'#C17E2A'};margin-left:auto;">$${Math.round(s.rev/100)/10}K</span>`:''}
        ${s.email&&!c?`<span style="font-size:7px;color:${on?'#5BA89E':'#2A8A8A'};margin-left:auto;">✉</span>`:''}
      </div>
      <div class="sim">
        <span>${s.city}${s.state?', '+s.state:''}${s.country?' · '+s.country:''}</span>
        ${s.contact?`<span>· ${s.contact.split(' ')[0]}</span>`:''}
        ${s.sentDate?`<span style="margin-left:auto;font-size:6px;color:${on?'#5BA89E':'#1A7B4E'};">✓ sent</span>`:''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('srch').placeholder='Search '+F.length+' shops...';
}
function renderDetail(){
  const sel=getSel(),det=document.getElementById('det');
  if(!sel){det.innerHTML='<div style="display:flex;align-items:center;justify-content:center;flex:1;color:#9A8E82;font-size:12px;">Select a shop</div>';return;}
  const isC=sel.status==='contacted'||sel.status==='active';
  const bdgBg=sel.status==='active'?'rgba(26,123,78,.9)':isC?'rgba(42,138,138,.9)':'rgba(224,122,80,.85)';
  const bdgTxt=sel.status==='active'?'Active':isC?'Contacted':'Not Contacted';
  let chips='';
  if(sel.rev)chips+=chip('Revenue','$'+sel.rev.toLocaleString(),'rgba(224,122,80,.08)','#C17E2A');
  if(sel.orders)chips+=chip('Orders',sel.orders);
  if(sel.last)chips+=chip('Last Order',sel.last);
  if(sel.days)chips+=chip('Days Since',sel.days+'d',sel.days>300?'rgba(178,74,44,.08)':'');
  chips+=chip('Source',sel.source);
  if(sel.sentDate)chips+=chip('Email Sent',sel.sentDate,'rgba(26,123,78,.08)','#1A7B4E');
  let compInner='',dTog='';
  if(drafts){
    dTog=`<div class="dtog">${['A','B'].map((l,i)=>`<button class="db${dIdx===i?' on':''}" onclick="setDI(${i})">Draft ${l}</button>`).join('')}</div>`;
    const sb2=body.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    compInner=`<div class="cbdy"><input value="${subj.replace(/"/g,'&quot;')}" oninput="subj=this.value" placeholder="Subject..."/><textarea rows="9" oninput="body=this.value">${sb2}</textarea></div>
    <div class="cft">
      ${sel.email?`<button class="svb" ${send||!body?'disabled':''} onclick="saveGmail()">${send?'Saving...':'→ Save to Gmail Drafts'}</button>`:`<span class="noe">⚠ No email on file</span>`}
      <button class="mrb" onclick="markSent('${sel.id}',body);toast('Marked contacted!')">✓ Mark Contacted</button>
      <span style="margin-left:auto;font-size:8px;color:#9A8E82;font-style:italic;">📚 ${learned.length} real emails learned</span>
    </div>`;
  }else{
    compInner=`<div class="emp"><div style="font-size:30px;color:#D4C5A9;margin-bottom:8px;">✉</div><div style="font-size:10px;line-height:1.6;color:#9A8E82;max-width:220px;margin:0 auto;">Click Generate Drafts for two personalized options in your voice.</div></div>`;
  }
  const sn=sel.name.replace(/'/g,"\\'");
  det.innerHTML=`<div class="ph"><img src="${gp(sel)}" onerror="this.style.display='none'" loading="lazy"/><div class="ov"><div style="display:flex;align-items:flex-end;justify-content:space-between;gap:8px;"><div><div class="shn">${sel.name}</div><div class="shm">${sel.city}${sel.state?', '+sel.state:''}${sel.country?' · '+sel.country:''}${sel.contact?' · '+sel.contact:''}${sel.email?' · '+sel.email:''}${sel.web?` · <a href="https://${sel.web}" target="_blank" style="color:rgba(91,168,158,.8);text-decoration:none;">↗ ${sel.web}</a>`:''}</div></div><div style="display:flex;gap:5px;align-items:center;flex-shrink:0;">${!isC?`<button class="mkb" onclick="openModal('${sel.id}','${sn}')">✓ Mark Sent</button>`:''}<span class="bdg" style="background:${bdgBg};">${bdgTxt}</span></div></div></div></div>
  <div class="scr">
    ${chips?`<div class="chips">${chips}</div>`:''}
    ${sel.b?.length?`<div class="buls"><div class="bulh">About This Shop</div>${sel.b.map(x=>`<div style="font-size:10px;color:#3D3530;display:flex;gap:5px;line-height:1.4;margin-bottom:3px;"><span style="color:#E07A50;flex-shrink:0;">→</span><span>${x}</span></div>`).join('')}</div>`:''}
    <div class="comp"><div class="comph"><span class="compt">Email Composer</span><div style="display:flex;gap:5px;align-items:center;">${dTog}<button class="gb" ${gen?'disabled':''} onclick="generate()">${gen?'Writing...':'✦ Generate Drafts'}</button></div></div>${err?`<div class="gerr">⚠ ${err}</div>`:''}${compInner}</div>
  </div>`;
}
renderAll();
</script>
